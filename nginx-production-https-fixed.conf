# ============================================================
# PRODUCTION NGINX CONFIG — track-myads.com (HTTPS)
# FIXED: Uses single-domain certificate (NOT wildcard)
# ============================================================

# ---------------- GLOBAL RATE LIMITS ----------------
limit_req_zone $binary_remote_addr zone=portfolio_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
limit_req_zone $host               zone=tenant_api_limit:10m rate=50r/s;
limit_req_zone $host               zone=tenant_tracking_limit:20m rate=1000r/s;

# ---------------- BACKEND (PRIVATE) ----------------
upstream backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

# ============================================================
# HTTP → HTTPS REDIRECT (ALL DOMAINS)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name track-myads.com www.track-myads.com *.track-myads.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# 1. ROOT DOMAIN → PORTFOLIO (HTTPS)
# CRITICAL: Must be FIRST to match root domain explicitly
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name track-myads.com www.track-myads.com;

    # SSL Configuration - Single domain certificate
    ssl_certificate /etc/letsencrypt/live/track-myads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/track-myads.com/chain.pem;

    # Modern TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/portfolio;
    index index.html;

    limit_req zone=portfolio_limit burst=100 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================
# 2. ADMIN SUBDOMAIN → ADMIN MODE (HTTPS)
# CRITICAL: Must be BEFORE wildcard to prevent matching
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.track-myads.com;

    # SSL Configuration - Single domain certificate (will show warning but works)
    ssl_certificate /etc/letsencrypt/live/track-myads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/track-myads.com/chain.pem;

    # Modern TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    # NOTE: ssl_stapling disabled for subdomains with single-domain cert
    # This prevents certificate validation errors
    ssl_stapling off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    limit_req zone=admin_limit burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # ✅ CRITICAL: Preserve original Host header
        set $forwarded_host $http_host;
        if ($forwarded_host = "") {
            set $forwarded_host $host;
        }
        
        proxy_set_header Host              $forwarded_host;
        proxy_set_header X-Forwarded-Host  $forwarded_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============================================================
# 3. TENANT SUBDOMAINS → TENANT MODE (HTTPS)
# CRITICAL: Wildcard pattern matches LAST (after admin)
# NOTE: Using single-domain cert - browsers will show warning but works
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.track-myads.com;

    # SSL Configuration - Single domain certificate
    # WARNING: Certificate doesn't match subdomain, but Nginx will still serve it
    # Browsers will show "Not Secure" warning until wildcard cert is obtained
    ssl_certificate /etc/letsencrypt/live/track-myads.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/track-myads.com/chain.pem;

    # Modern TLS Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    # NOTE: ssl_stapling disabled for subdomains with single-domain cert
    # This prevents certificate validation errors that cause 403
    ssl_stapling off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # APIs
    location /api {
        limit_req zone=tenant_api_limit burst=100 nodelay;
        
        # ✅ CRITICAL: Preserve original Host header
        set $forwarded_host $http_host;
        if ($forwarded_host = "") {
            set $forwarded_host $host;
        }
        
        proxy_set_header Host              $forwarded_host;
        proxy_set_header X-Forwarded-Host  $forwarded_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Tracking (HIGH RPS)
    location ~ ^/(click|imp|postback)$ {
        limit_req zone=tenant_tracking_limit burst=3000 nodelay;
        
        # ✅ CRITICAL: Preserve original Host header
        set $forwarded_host $http_host;
        if ($forwarded_host = "") {
            set $forwarded_host $host;
        }
        
        proxy_set_header Host              $forwarded_host;
        proxy_set_header X-Forwarded-Host  $forwarded_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://backend;
        access_log off;
    }
}

# ============================================================
# 4. BLOCK DIRECT BACKEND ACCESS
# ============================================================
server {
    listen 5001;
    server_name _;
    return 444;
}
