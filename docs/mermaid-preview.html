W->>R: XREADGROUP stream:conversions\n  VW->>DB: INSERT conversions + postback logs\n  VW-->>PUB: Approved only -> HTTP callback\n\n  FE->>API: GET /api/dashboard /reports\n  API->>DB: Query aggregates (tenant-scoped)\n  DB-->>API: KPI rows\n  API-->>FE: JSON response"}, {"label": "Figure 7.1: Flowchart detailing the synchronous Click execution path.", "code": "flowchart TD\n  A[\"Request: GET click\"] --> B[\"Parse public IDs\"]\n  B --> C[\"Resolve tenantId from Host\"]\n  C --> D{tenantId present}\n  D -->|No| E[\"Reject request\"]\n  D -->|Yes| F[\"Redirect cache lookup\"]\n  F --> G{Cached redirect exists}\n  G -->|Yes| H[\"Return cached redirect\"]\n  G -->|No| I[\"Resolve internal IDs\"]\n  I --> J[\"Resolve publisher\"]\n  J --> K{Offer and Publisher valid}\n  K -->|No| L[\"Return error page\"]\n  K -->|Yes| M[\"Resolve assignment\"]\n  M --> N{Assignment status live}\n  N -->|No| O[\"Return fallback URL\"]\n  N -->|Yes| P[\"Generate click uuid\"]\n  P --> Q[\"Build redirect URL\"]\n  Q --> R[\"HSET click metadata\"]\n  R --> S[\"XADD stream:clicks\"]\n  S --> T[\"Set cache TTL\"]\n  T --> U[\"302 Redirect immediately\"]"}, {"label": "Figure 7.2: Decoupled and Resilient Postback Processing Logic.", "code": "flowchart TD\n  A[\"Merchant: postback\"] --> B[\"Parse parameters\"]\n  B --> C[\"Resolve tenantId\"]\n  C --> D[\"Normalize status\"]\n  D --> E[\"Redis click lookup\"]\n  E --> F{Click context found}\n  F -->|No| G[\"DB fallback lookup\"]\n  G --> H{Found in DB}\n  H -->|No| I[\"Return not found\"]\n  H -->|Yes| J[\"Apply validity checks\"]\n  F -->|Yes| J\n  J --> K[\"Approval control\"]\n  K --> L[\"Enforce idempotency\"]\n  L --> M[\"XADD stream:conversions\"]\n  M --> N[\"Conversion Worker persists\"]\n  N --> O{Status approved}\n  O -->|Yes| P[\"Fire publisher callback\"]\n  O -->|No| Q[\"Skip callback\"]\n  P --> R[\"Log postback event\"]\n  Q --> R"}, {"label": "Figure 7.3: Stream-based Async Worker Topology for high-throughput persistence.", "c   <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

    const dataEl = document.getElementById('diagram-data');
    const diagrams = JSON.parse(dataEl.textContent || '[]');
    const root = document.getElementById('root');

    for (let i = 0; i < diagrams.length; i++) {
      const card = document.createElement('div');
      card.className = 'card';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = `${diagrams[i].label} (#${i+1})`;

      const pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = diagrams[i].code;

      card.appendChild(label);
      card.appendChild(pre);
      root.appendChild(card);
    }

    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    await mermaid.run({ querySelector: '.mermaid' });
  </script>
