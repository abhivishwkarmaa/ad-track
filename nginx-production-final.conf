
# ============================================================
# PRODUCTION NGINX CONFIG — track-myads.com
# Uses SINGLE WILDCARD CERT (track-myads.com-0001)
# ============================================================

# ---------------- RATE LIMIT ZONES ----------------
limit_req_zone $binary_remote_addr zone=portfolio_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
limit_req_zone $host               zone=tenant_api_limit:10m rate=50r/s;
limit_req_zone $host               zone=tenant_tracking_limit:20m rate=1000r/s;

# ---------------- BACKEND ----------------
upstream backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

# ============================================================
# HTTP → HTTPS REDIRECTS (SPLIT — VERY IMPORTANT)
# ============================================================

# Root domain
server {
    listen 80;
    listen [::]:80;
    server_name track-myads.com www.track-myads.com;
    return 301 https://track-myads.com$request_uri;
}

# All subdomains
server {
    listen 80;
    listen [::]:80;
    server_name *.track-myads.com;
    return 301 https://$host$request_uri;
}

# ============================================================
# ROOT DOMAIN — PORTFOLIO
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name track-myads.com www.track-myads.com;

    ssl_certificate     /etc/letsencrypt/live/track-myads.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portfolio/dist;
    index index.html;

    limit_req zone=portfolio_limit burst=100 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }
}

# ============================================================
# ADMIN SUBDOMAIN — admin.track-myads.com
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.track-myads.com;

    ssl_certificate     /etc/letsencrypt/live/track-myads.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    limit_req zone=admin_limit burst=20 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }
}

# ============================================================
# TENANT SUBDOMAINS — *.track-myads.com
# ============================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.track-myads.com;

    ssl_certificate     /etc/letsencrypt/live/track-myads.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track-myads.com-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        limit_req zone=tenant_api_limit burst=100 nodelay;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }

    location ~ ^/(click|imp|postback)$ {
        limit_req zone=tenant_tracking_limit burst=3000 nodelay;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port  443;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_redirect off;
    }

    location /health {
        proxy_pass http://backend;
        access_log off;
    }
}

