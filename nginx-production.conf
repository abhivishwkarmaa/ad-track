# ============================================================
# FINAL NGINX CONFIG — track-myads.com
# ============================================================

# ---------------- GLOBAL RATE LIMITS ----------------
limit_req_zone $binary_remote_addr zone=portfolio_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
limit_req_zone $host               zone=tenant_api_limit:10m rate=50r/s;
limit_req_zone $host               zone=tenant_tracking_limit:20m rate=1000r/s;

# ---------------- BACKEND (PRIVATE) ----------------
upstream backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

# ============================================================
# 1. ROOT DOMAIN → PORTFOLIO
# ============================================================
server {
    listen 443 ssl http2;
    server_name track-myads.com www.track-myads.com;

    ssl_certificate     /etc/ssl/certs/track-myads.crt;
    ssl_certificate_key /etc/ssl/private/track-myads.key;

    root /var/www/portfolio;
    index index.html;

    limit_req zone=portfolio_limit burst=100 nodelay;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ============================================================
# 2. ADMIN SUBDOMAIN → FRONTEND (ADMIN MODE)
# ============================================================
server {
    listen 443 ssl http2;
    server_name admin.track-myads.com;

    ssl_certificate     /etc/ssl/certs/ad-track-admin.crt;
    ssl_certificate_key /etc/ssl/private/ad-track-admin.key;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    limit_req zone=admin_limit burst=20 nodelay;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

# ============================================================
# 3. TENANT SUBDOMAINS → FRONTEND (TENANT MODE)
# ============================================================
server {
    listen 443 ssl http2;
    server_name *.track-myads.com;

    ssl_certificate     /etc/ssl/certs/ad-track-wildcard.crt;
    ssl_certificate_key /etc/ssl/private/ad-track-wildcard.key;

    root /var/www/ad-track/Pulpy_Reporting_Portal_frontend/dist;
    index index.html;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dashboard / APIs
    location /api {
        limit_req zone=tenant_api_limit burst=100 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Tracking (HIGH RPS)
    location ~ ^/(click|imp|postback)$ {
        limit_req zone=tenant_tracking_limit burst=3000;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /health {
        proxy_pass http://backend;
        access_log off;
    }
}

# ============================================================
# 4. HTTP → HTTPS REDIRECT
# ============================================================
server {
    listen 80;
    server_name track-myads.com www.track-myads.com admin.track-myads.com *.track-myads.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# 5. BLOCK DIRECT BACKEND ACCESS
# ============================================================
server {
    listen 5001;
    server_name _;
    return 444;
}
