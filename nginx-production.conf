# NGINX Configuration for Multi-Tenant Ad Tracking Platform
# Production Setup
#
# This configuration:
# - Serves frontend static files
# - Proxies /api/* to backend (localhost:5001)
# - Preserves Host header for tenant resolution
# - Handles wildcard subdomains (*.track-myads.com)
# - Protects admin subdomain

# Upstream backend (internal, NOT exposed publicly)
upstream backend {
    server localhost:5001;
    keepalive 32;
}

# Wildcard server for tenant subdomains
# Handles: tenant1.track-myads.com, tenant2.track-myads.com, etc.
server {
    listen 443 ssl http2;
    server_name *.track-myads.com;

    # SSL certificates (wildcard certificate)
    ssl_certificate /etc/ssl/certs/ad-track-wildcard.crt;
    ssl_certificate_key /etc/ssl/private/ad-track-wildcard.key;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root for frontend static files (built React app)
    root /var/www/ad-track-frontend/dist;
    index index.html;

    # ✅ CRITICAL: Preserve Host header for tenant resolution
    # This ensures backend receives the original subdomain
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Rate limiting per tenant (for billing/fair usage)
    limit_req_zone $host zone=tenant_limit:10m rate=100r/s;
    limit_req zone=tenant_limit burst=200 nodelay;

    # Serve frontend static files
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy API requests to backend
    # ✅ Host header preserved via proxy_set_header above
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Proxy tracking endpoints to backend
    # These need Host header for tenant resolution
    location ~ ^/(click|postback|imp)$ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        # Rate limiting for tracking (higher limit)
        limit_req zone=tenant_limit burst=1000;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

# Admin subdomain (stricter rules)
server {
    listen 443 ssl http2;
    server_name admin.track-myads.com;

    ssl_certificate /etc/ssl/certs/ad-track-admin.crt;
    ssl_certificate_key /etc/ssl/private/ad-track-admin.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/ad-track-frontend/dist;
    index index.html;

    # Stricter rate limiting for admin
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/s;
    limit_req zone=admin_limit burst=20 nodelay;

    # Optional: IP whitelist for admin (uncomment if needed)
    # allow 1.2.3.4;  # Your office IP
    # allow 5.6.7.8;  # Your home IP
    # deny all;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name *.track-myads.com admin.track-myads.com;
    
    # Allow Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Block direct backend access (security)
# Backend should ONLY be accessible via localhost
# This is handled by firewall, but NGINX can also block
server {
    listen 5001;
    server_name _;
    return 444;  # Close connection without response
}
