version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulpy_postgres
    environment:
      POSTGRES_DB: pulpy_reporting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulpy_backend
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pulpy_reporting
      DB_USER: postgres
      DB_PASSWORD: postgres
      BASE_URL: http://localhost:3000
      TRACKING_DOMAIN: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: npm start

volumes:
  postgres_data:

